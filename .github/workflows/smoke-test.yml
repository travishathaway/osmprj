name: Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke test / ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-64
            runner: ubuntu-latest
          - platform: osx-arm64
            runner: macos-14
          - platform: win-64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.5
        with:
          environments: rust pack
          cache: true

      - name: Build conda package
        shell: bash
        run: |
          pixi run --environment pack \
            rattler-build build \
            --channel gis-forge --channel conda-forge \
            --variant-config recipe/variants.${{ matrix.platform }}.yaml \
            -r recipe/recipe.yaml \
            --output-dir output/

      - name: Pack environment
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(output/${{ matrix.platform }}/*.conda)
          if [ "${#artifacts[@]}" -ne 1 ]; then
            echo "Expected exactly one conda artifact for ${{ matrix.platform }}, found ${#artifacts[@]}" >&2
            exit 1
          fi
          pixi run --environment pack pixi-pack \
            --environment default \
            --platform ${{ matrix.platform }} \
            --inject "${artifacts[0]}" \
            --create-executable \
            pixi.toml

      - name: Rename installer
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "win-64" ]; then
            mv environment.ps1 osmprj-${{ matrix.platform }}-installer.ps1
          else
            mv environment.sh osmprj-${{ matrix.platform }}-installer.sh
          fi

      - name: Run installer (Unix)
        if: matrix.platform != 'win-64'
        run: ./osmprj-${{ matrix.platform }}-installer.sh --output-directory /tmp/osmprj-test

      - name: Run installer (Windows)
        if: matrix.platform == 'win-64'
        shell: pwsh
        run: .\osmprj-win-64-installer.ps1 --output-directory "$Env:RUNNER_TEMP\osmprj-test"

      - name: Assert binary is functional (Unix)
        if: matrix.platform != 'win-64'
        run: /tmp/osmprj-test/env/bin/osmprj --version

      - name: Assert binary is functional (Windows)
        if: matrix.platform == 'win-64'
        shell: pwsh
        run: |
          & "$Env:RUNNER_TEMP\osmprj-test\env\bin\osmprj.exe" --version
