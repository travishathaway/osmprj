schema_version: 1

context:
  name: osmprj
  version: "0.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  path: ../

build:
  number: 0

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
  run:
    - osm2pgsql
    - osm2pgsql-themepark
    - pgosm-themepark

tests:
  - script:
      - osmprj --help
      - osmprj init

about:
  homepage: https://github.com/travishathaway/osmprj
  summary: OpenStreetMap and PostgreSQL project management tool
  repository: https://github.com/travishathaway/osmprj
  license: GPL-3.0-only
  license_file:
    - LICENSE
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - travishathaway
